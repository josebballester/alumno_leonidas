<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio - App Web</title>
    <style>
        /* Remueve márgenes y asegura que el iframe ocupe el 100% de la pantalla */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        /* Configura el contenedor adaptativo */
        .iframe-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <!-- Reemplaza la URL de abajo por tu URL de ejecución (/exec) de GAS -->
        <iframe src="https://script.google.com/macros/s/AKfycby7ee4xtA_UMuGUgbgZJr0981G9tgHgFOQa12liCk_g3-8fG805mDREUMgVpeMaipx_PA/exec"></iframe>
    </div>

</body>
</html>
